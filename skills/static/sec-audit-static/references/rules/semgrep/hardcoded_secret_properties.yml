rules:
  - id: hardcoded-secret-properties
    message: "Hardcoded credential/secret in .properties file"
    severity: ERROR
    languages: [generic]
    pattern-regex: '(?i)^\s*[^#\n]*\b(password|passwd|pwd|secret|api\.client\.secret|pay\.secret\.key|naverocr\.option\.secretkey|oneidpass\.secret)\b\s*=\s*[^\s#]+'
    paths:
      include:
        - "*.properties"
    metadata:
      category: security
      cwe: "CWE-798"
      owasp: "A07:2021 Identification and Authentication Failures"
      confidence: HIGH
